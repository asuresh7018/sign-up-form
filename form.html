<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign up form</title>
    <link rel="stylesheet" href="styles.css">
    <script src="code.js" defer></script>
</head>

<body>
    <div class="left-side">
        <div id="bannerbackground"></div>
        <div id="logobanner">
            <img src="odin-logo.png" alt="" id="logo">
            <div id="logotext">ODIN</div>
        </div>
        <div id="credits">Photo from unsplash.com</div>
    </div>
    <div class="right-side">
        <div id="prompt">
            <div id="prompttext">This is not a real online service! You know you need something like this in your life
                to help you realise your deepest dreams. <div>Sign up <span class="italicised">now</span> to get started.</div><p>
                <p>You <span class="italicised">know</span> you want to.</p>
            </div>
        </div>
        <div id="formContent">
            Let's do this!
            <form id="myForm" action="#" method="post">
                <div id="placeholder1" class="fielddiv">
                    <label for="placeholder1" name="placeholder1">First Name</label>
                    <input type="text" id="input1">
                </div>
                <div id="placeholder2"class="fielddiv">
                    <label for="placeholder2" name="placeholder2">Last Name</label>
                    <input type="text" id="input2">
                </div>
                <div id="placeholder3"class="fielddiv">
                    <label for="placeholder3" name="placeholder3">Email</label>
                    <input type="text" id="input3">
                </div>
                <div id="placeholder4"class="fielddiv">
                    <label for="placeholder4" name="placeholder4">Phone Number</label>
                    <input type="text" id="input4">
                </div>
                <div id="placeholder5"class="fielddiv">
                    <label for="placeholder5" name="placeholder5">Password</label>
                    <input type="text" id="input5">
                </div>
                <div id="placeholder6"class="fielddiv">
                    <label for="placeholder6" name="placeholder6">Confirm Password</label>
                    <input type="text" id="input6">
                </div>
            </form>
        </div>
        <div id="accountSegment">
            <div id="createAccount"></div>
            <button type="submit" form="myForm" id="createButton">Create Account</button>
            <p></p>
            <div id="alreadyHaveAccount">Already have an account? Log in</div>
        </div>
    </div>

</body>

</html>
